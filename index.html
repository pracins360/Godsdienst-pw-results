<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher's Converter</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eaf3ff, #f8fbff);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #122033;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 34px;
      padding: 28px 22px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .formula {
      display: inline-block;
      background: #eef1f5;
      color: #405064;
      padding: 10px 26px;
      border-radius: 30px;
      font-size: 22px;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #075467;
    }

    input {
      width: 100%;
      font-size: 64px;
      text-align: center;
      padding: 14px;
      border: 4px solid #5a9df0;
      border-radius: 28px;
      outline: none;
      color: #122033;
      box-shadow: inset 0 0 0 2px #d7e8ff;
    }

    input:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 6px rgba(22, 119, 255, 0.15);
    }

    .note {
      margin-top: 12px;
      font-size: 18px;
      color: #526173;
    }

    .result-box {
      margin-top: 34px;
      background: #0d1628;
      color: white;
      border-radius: 34px;
      padding: 28px 18px;
      box-shadow: 0 18px 28px rgba(13, 22, 40, 0.28);
    }

    .result-title {
      font-size: 20px;
      letter-spacing: 4px;
      color: #cbd5e1;
      font-weight: 700;
      margin-bottom: 8px;
    }

    #result {
      font-size: 92px;
      line-height: 1;
      font-weight: 900;
      color: #ffd21e;
    }

    .decimal {
      margin-top: 10px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .warning {
      margin-top: 14px;
      font-size: 17px;
      color: #b42318;
      min-height: 22px;
      font-weight: 700;
    }

    .footer {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid #e5e7eb;
      font-size: 16px;
      color: #596579;
      line-height: 1.5;
    }

    @media (max-width: 380px) {
      .title {
        font-size: 29px;
      }

      input {
        font-size: 54px;
      }

      #result {
        font-size: 78px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="title">Teacher's Converter</div>
    <div class="formula">(10 ÷ 56) × n</div>

    <label for="points">Enter total points</label>
    <input
      id="points"
      type="number"
      min="1"
      max="57"
      inputmode="numeric"
      placeholder="0"
      oninput="convertPoints()"
      autofocus
    />

    <div class="note">Allowed range: 1 to 57</div>
    <div id="warning" class="warning"></div>

    <section class="result-box">
      <div class="result-title">INSTANT RESULT</div>
      <div id="result">0.0</div>
      <div class="decimal">rounded to 1 decimal place</div>
    </section>

    <div class="footer">
      Updates automatically while typing.<br>
      Formula: <b>(10 / 56) × total points</b>
    </div>
  </main>

  <script>
    function convertPoints() {
      const input = document.getElementById("points");
      const result = document.getElementById("result");
      const warning = document.getElementById("warning");

      const n = Number(input.value);

      if (input.value === "") {
        result.textContent = "0.0";
        warning.textContent = "";
        return;
      }

      if (n < 1 || n > 57) {
        warning.textContent = "Please enter a number from 1 to 57.";
      } else {
        warning.textContent = "";
      }

      const answer = (10 / 56) * n;
      result.textContent = answer.toFixed(1);
    }
  </script>
</body>
</html>
