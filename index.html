<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Teacher's Calculator (10/56 × n)</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            padding: 2rem 1.8rem 2.2rem;
            text-align: center;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
            color: #0b3b5f;
            letter-spacing: -0.3px;
        }
        .formula-badge {
            background: #e9edf2;
            display: inline-block;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            color: #075985;
            margin: 0.5rem 0 1.5rem 0;
        }
        .input-area {
            margin-bottom: 2rem;
        }
        label {
            font-weight: 600;
            color: #1e4663;
            display: block;
            margin-bottom: 0.6rem;
            font-size: 1rem;
        }
        input {
            width: 100%;
            font-size: 2.2rem;
            padding: 0.5rem 1rem;
            text-align: center;
            font-family: monospace;
            font-weight: 600;
            background: #fefcf5;
            border: 2px solid #cbd5e6;
            border-radius: 60px;
            outline: none;
            transition: 0.15s;
            color: #0c2e42;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px #3b82f640;
            background: white;
        }
        .range-hint {
            font-size: 0.8rem;
            color: #3c5a7d;
            margin-top: 8px;
        }
        .result-panel {
            background: #0f212f;
            border-radius: 56px;
            padding: 1.2rem 0.8rem;
            margin: 1.6rem 0 1rem;
            box-shadow: inset 0 1px 3px #ffffff20, 0 10px 20px -8px black;
        }
        .result-label {
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .result-number {
            font-size: 3.8rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: #facc15;
            text-shadow: 0 2px 4px #00000040;
            line-height: 1.2;
        }
        .example {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 0.6rem;
            font-size: 0.85rem;
            color: #1e3a5f;
            margin-top: 1.2rem;
            display: inline-block;
            width: auto;
        }
        .footer {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: #4a627a;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }
        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            .result-number { font-size: 2.8rem; }
            input { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📐 Teacher's Converter</h1>
    <div class="formula-badge">(10 ÷ 56) × n</div>

    <div class="input-area">
        <label>🔢 Enter a number (1 – 57)</label>
        <input type="number" id="numberInput" value="24" step="1" min="1" max="57">
        <div class="range-hint">✅ allowed range: 1 to 57 (both inclusive)</div>
    </div>

    <div class="result-panel">
        <div class="result-label">⚡ Instant result (1 decimal)</div>
        <div class="result-number" id="liveResult">4.3</div>
    </div>

    <div class="example">
        🧪 Example: 24  →  (10÷56)×24 = 4.2857…  →  <strong>4.3</strong>
    </div>
    <div class="footer">
        ✨ Updates automatically as you type / change the number.<br>
        Formula: <strong>(10/56) × input</strong> → rounded to <strong>1 decimal place</strong>
    </div>
</div>

<script>
    const inputField = document.getElementById('numberInput');
    const resultSpan = document.getElementById('liveResult');

    // Constant factor = 10 / 56
    const FACTOR = 10 / 56;   // exactly 0.17857142857142858

    function updateResult() {
        let rawValue = inputField.value;
        let numeric = parseFloat(rawValue);

        // Handle empty or invalid
        if (isNaN(numeric)) {
            numeric = 1;
            inputField.value = 1;
        }

        // Enforce range [1, 57]
        let clamped = numeric;
        if (clamped < 1) clamped = 1;
        if (clamped > 57) clamped = 57;

        // If clamping changed the displayed value, sync the input field
        if (clamped !== numeric) {
            inputField.value = clamped;
        }

        // Apply formula
        const rawResult = FACTOR * clamped;

        // Round to 1 decimal place (standard rounding)
        const rounded = rawResult.toFixed(1);
        resultSpan.textContent = rounded;
    }

    // Event listeners for instant update
    inputField.addEventListener('input', updateResult);
    inputField.addEventListener('blur', function() {
        let v = parseFloat(inputField.value);
        if (isNaN(v)) {
            inputField.value = 1;
        } else if (v < 1) {
            inputField.value = 1;
        } else if (v > 57) {
            inputField.value = 57;
        }
        updateResult();
    });

    // Initialize with default value 24 → 4.3
    updateResult();
</script>
</body>
</html>
