<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Teacher's Calculator | (10÷56) × n</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #e0e7f0, #f5f7fc);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .calculator {
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            border-radius: 64px;
            box-shadow: 0 30px 45px -20px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.8);
            max-width: 480px;
            width: 100%;
            padding: 2rem 1.8rem;
            text-align: center;
        }
        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 0.3rem;
            color: #1a2c3e;
        }
        .formula {
            background: #1f2f3e20;
            display: inline-block;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            color: #0a4c6e;
            margin-bottom: 1.8rem;
        }
        .input-group {
            margin-bottom: 2rem;
        }
        label {
            font-weight: 600;
            color: #1f4e6e;
            display: block;
            margin-bottom: 0.6rem;
            font-size: 1rem;
        }
        input {
            width: 100%;
            font-size: 2.4rem;
            padding: 0.6rem 1rem;
            text-align: center;
            font-family: monospace;
            font-weight: 600;
            background: #fffcf0;
            border: 2px solid #b9cadb;
            border-radius: 60px;
            outline: none;
            transition: 0.15s;
            color: #0a2a3b;
        }
        input:focus {
            border-color: #2c7cb6;
            box-shadow: 0 0 0 3px #2c7cb640;
            background: white;
        }
        .range-hint {
            font-size: 0.75rem;
            color: #3a6b8c;
            margin-top: 8px;
        }
        .result-card {
            background: #0b2b3b;
            border-radius: 48px;
            padding: 1.2rem 0.8rem;
            margin: 1.5rem 0 1rem;
            box-shadow: inset 0 1px 2px #ffffff30, 0 8px 18px -6px black;
        }
        .result-label {
            color: #9bb7d0;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .result-value {
            font-size: 3.6rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: #ffd966;
            text-shadow: 0 2px 3px #00000030;
            line-height: 1.2;
        }
        .example-hint {
            background: #eef3fc;
            border-radius: 36px;
            padding: 0.5rem;
            font-size: 0.85rem;
            color: #1b4e6e;
            display: inline-block;
            margin-top: 0.8rem;
        }
        .footer {
            margin-top: 1.3rem;
            font-size: 0.7rem;
            color: #4f6f8a;
            border-top: 1px solid #cbddee;
            padding-top: 1rem;
        }
        @media (max-width: 480px) {
            .calculator { padding: 1.5rem; }
            .result-value { font-size: 2.6rem; }
            input { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="calculator">
    <h2>📐 Teacher's Converter</h2>
    <div class="formula">(10 ÷ 56) × n</div>

    <div class="input-group">
        <label>🔢 Enter a number (1 – 56)</label>
        <input type="number" id="numberInput" value="34" step="1" min="1" max="56">
        <div class="range-hint">✅ Scroll with mouse wheel or use ▲/▼ arrows — result updates instantly</div>
    </div>

    <div class="result-card">
        <div class="result-label">⚡ Instant result (1 decimal)</div>
        <div class="result-value" id="liveResult">6.1</div>
    </div>

    <div class="example-hint">
        🧪 Example: 34  →  (10÷56)×34 = 6.0714…  →  <strong>6.1</strong>
    </div>
    <div class="footer">
        ✨ Updates as you type, scroll, or use arrows.<br>
        Formula: <strong>(10/56) × input</strong> → rounded to <strong>1 decimal</strong>
    </div>
</div>

<script>
    const inputEl = document.getElementById('numberInput');
    const resultEl = document.getElementById('liveResult');
    const FACTOR = 10 / 56;   // exactly 0.17857142857142858

    function update() {
        let raw = inputEl.value;
        let num = parseFloat(raw);
        
        // default & error handling
        if (isNaN(num)) num = 1;
        
        // enforce range 1..56
        if (num < 1) num = 1;
        if (num > 56) num = 56;
        
        // sync input if clamped
        if (num !== parseFloat(inputEl.value)) {
            inputEl.value = num;
        }
        
        const resultRaw = FACTOR * num;
        const rounded = resultRaw.toFixed(1);   // 1 decimal place
        resultEl.textContent = rounded;
    }

    // instant on any change: typing, arrows, scroll on number field
    inputEl.addEventListener('input', update);
    inputEl.addEventListener('blur', () => {
        let v = parseFloat(inputEl.value);
        if (isNaN(v)) inputEl.value = 1;
        else if (v < 1) inputEl.value = 1;
        else if (v > 56) inputEl.value = 56;
        update();
    });
    
    // initial value = 34 -> 6.1
    update();
</script>
</body>
</html>
